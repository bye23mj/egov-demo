# Codex CLI 설정
# 전자정부표준프레임워크 프로젝트 (Java 17 + Spring MVC + MyBatis + Oracle 11g)

model = "gpt-5.5"
model_reasoning_effort = "xhigh"

[project]
type = "egov-framework"
name = "egov-demo"
language = "Java"
javaVersion = "17"
framework = "Spring 5.x"
orm = "MyBatis"
database = "Oracle 11g"
buildTool = "Maven"
testFramework = "JUnit 5"

[conventions]
# 패키지 네이밍
packagePrefix = "egovframework.example"
controllerSuffix = "Controller"
serviceSuffix = "Service"
serviceSuffixImpl = "ServiceImpl"
daoSuffix = "DAO"
voSuffix = "VO"

# 메서드 네이밍
selectMethodPrefix = "select"
insertMethodPrefix = "insert"
updateMethodPrefix = "update"
deleteMethodPrefix = "delete"

# 파일 위치 규칙
[directories]
srcMain = "src/main/java"
srcTest = "src/test/java"
resources = "src/main/resources"
sqlmaps = "src/main/resources/egovframework/sqlmap"
jsp = "src/main/webapp/WEB-INF/jsp"
springConfig = "src/main/resources/egovframework/spring"

[standards]
# 코딩 표준
requireJavadoc = true
maxLineLength = 120
indentSize = 4
indentUsingSpaces = true

# 계층 분리
enforceLayerSeparation = true
# Controller → Service → DAO 순 호출만 허용
denyControllerToDAODirect = true

# SQL 표준
enforceOracleSQL = true
forbiddenSyntax = ["OFFSET", "LIMIT", "AUTO_INCREMENT", "IF()"]
requiredSyntax = ["ROWNUM", "Sequence", "||", "DECODE()"]

# 테스트
requireTests = true
testCoverage = 85

[security]
forbiddenPatterns = [
  "\\bpassword\\s*=",
  "\\btoken\\s*=",
  "\\bapi_key\\s*=",
  "hardcoded.*secret"
]
requireParamBinding = true
forbidStringConcatenationInSQL = true

[oracle]
version = "11g"
pageQueryPattern = "rownum-3level"
dateFormat = "TO_DATE"
nullHandling = "NVL"
numberSequence = "true"
# Oracle 11g는 다음을 금지
forbiddenOracleFeatures = [
  "OFFSET FETCH",
  "JSON functions",
  "Implicit type conversion"
]

[caching]
enableQueryCache = false
enableResultCache = false

[performance]
maxMethodLines = 200
maxClassLines = 1000
maxParametersPerMethod = 8

[projects."/Users/ai/vscode/egov-demo"]
trust_level = "trusted"
custom_rules = ".claude/rules"

[logging]
level = "INFO"
format = "slf4j"
