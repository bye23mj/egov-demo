services:
  oracle:
    image: wnameless/oracle-xe-11g-r2
    container_name: oracle-xe-egov
    ports:
      - "1521:1521"
      - "8080:8080"
    environment:
      ORACLE_ALLOW_REMOTE: "true"
    volumes:
      - oracle_xe_data:/u01/app/oracle
    restart: unless-stopped
volumes:
  oracle_xe_data: {}
